<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Tork Digital</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/images/logocircle.png" />
  <style>
    @font-face { font-family: 'Raleway'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/raleway-latin-600-normal.woff2') format('woff2'); }
    @font-face { font-family: 'Outfit'; font-style: normal; font-weight: 300; font-display: swap; src: url('/fonts/outfit-latin-300-normal.woff2') format('woff2'); }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/jetbrains-mono-latin-500-normal.woff2') format('woff2'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0F1A; --surface: #131a2c; --white: #F2F5FF;
      --blue: #0066FF; --purple: #7C3AEA; --muted: #96a2be;
      --border: rgba(150,162,190,0.14);
      --gradient: linear-gradient(135deg, #0066FF 0%, #7C3AEA 100%);
    }
    body {
      background: var(--bg); color: var(--white);
      font-family: 'Outfit', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
      background-image: radial-gradient(rgba(150,162,190,0.06) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    .code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
      letter-spacing: 3px; color: var(--purple); margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Raleway', sans-serif; font-weight: 600;
      font-size: clamp(2.2rem, 6vw, 3.5rem); letter-spacing: -1px;
      margin-bottom: 1rem; line-height: 1.15;
    }
    .grad {
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: var(--muted); max-width: 420px; margin: 0 auto 2.25rem; line-height: 1.7; }
    .btn {
      display: inline-block; background: var(--gradient); color: #fff;
      text-decoration: none; font-weight: 400; font-size: 0.95rem;
      padding: 0.9rem 1.8rem; border-radius: 10px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .btn:hover { box-shadow: 0 8px 28px rgba(0,102,255,0.4); transform: translateY(-1px); }
    a:focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <p class="code">ERROR 404</p>
    <h1>This page has <span class="grad">levelled out.</span></h1>
    <p>The page you're after doesn't exist, or it has moved. Head back to the homepage and we'll get you sorted.</p>
    <a class="btn" href="/">Back to Tork Digital</a>
  </main>
</body>
</html>
